<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>旅游行程生成器</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

body{
font-family:"Microsoft YaHei";
background:#f5f7fa;
margin:0;
padding:30px;
}

h2{margin-bottom:20px;}

.top-bar{
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
}

input,select{
padding:8px;
border:1px solid #dcdfe6;
border-radius:6px;
}

button{
padding:8px 16px;
background:#409eff;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
}

button.secondary{background:#67c23a;}
button.gray{background:#909399;}

.card{
background:#fff;
border-radius:10px;
padding:20px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.day-title{font-weight:bold;margin-bottom:10px;}

.row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.row input{flex:1;min-width:150px;}

.inline{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}

.summary-box{
background:#eef4ff;
padding:15px;
border-radius:10px;
margin-bottom:20px;
text-align:center;
}

.cover img{
width:100%;
height:260px;
object-fit:cover;
border-radius:10px;
margin-bottom:20px;
}

.outline,.extra-box{
background:#fff;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

#output{
max-width:800px;
margin:auto;
}

#qrcodeBox{
display:none;
text-align:center;
margin-top:20px;
border-top:1px dashed #ddd;
padding-top:15px;
}

</style>
</head>

<body>

<h2>旅游行程生成器</h2>

<div class="top-bar">
<label>行程天数</label>
<input type="number" id="days" value="3">
<button onclick="createInputs()">生成输入框</button>

<div style="flex:1"></div>

<button class="secondary" onclick="build()">生成行程</button>
<button class="gray" onclick="makeLink()">生成链接</button>
<button onclick="exportImage()">生成长图</button>
</div>

<div id="inputArea"></div>
<hr>
<div id="output"></div>

<!-- 二维码 -->
<div id="qrcodeBox">
<canvas id="qrcode"></canvas>
<div style="margin-top:10px;color:#666;">
XXX旅行社<br>
咨询电话：13800000000
</div>
</div>

<script>

function createInputs(){
const n=document.getElementById("days").value
const area=document.getElementById("inputArea")
area.innerHTML=""

for(let i=1;i<=n;i++){
area.innerHTML+=`
<div class="card">

<div class="day-title">第${i}天</div>

<div class="row">
<input placeholder="如：上海 → 杭州">
</div>

<div class="row">
<input><input><input>
</div>

<div class="inline">
<label>用餐</label>
<select>
<option>选择</option>
<option>早</option>
<option>中</option>
<option>晚</option>
</select>

<label>住宿</label>
<input>

<label>酒店</label>
<input>
</div>

</div>
`
}
}

function build(){

const cards=document.querySelectorAll(".card")
const out=document.getElementById("output")

let html=""
let routes=[]

cards.forEach((card,i)=>{

const inputs=card.querySelectorAll("input")
const selects=card.querySelectorAll("select")

const route=inputs[0].value
const spots=[inputs[1].value,inputs[2].value,inputs[3].value].filter(Boolean)
const meal=selects[0].value
const stay=inputs[4].value
const hotel=inputs[5].value

if(route) routes.push(route)

html+=`<div class="card"><h3>第${i+1}天</h3>`

if(route) html+=`<div><b>${route}</b></div>`

spots.forEach(s=>{
html+=`<div>${s}</div>`
})

html+=`
<div>用餐：${meal}</div>
<div>住宿：${stay}</div>
<div>酒店：${hotel}</div>
</div>
`
})

let title=""
if(routes.length){
title=routes[0]+"等地 "+cards.length+"天"+(cards.length-1)+"晚行程"
}

let summary=""
routes.forEach((r,i)=>{
summary+=`<div>D${i+1}：${r}</div>`
})

out.innerHTML=`

<div class="cover">
<img src="https://picsum.photos/1200/400">
</div>

<div class="summary-box">
<h2>${title}</h2>
<div style="color:#666;">精品旅游行程推荐</div>
</div>

<div class="outline">
<h3>行程概览</h3>
${summary}
</div>

${html}

<div class="extra-box">
<h3>费用说明</h3>
<div>✔ 含：住宿、交通、导游</div>
<div>✘ 不含：个人消费</div>
</div>

<div class="extra-box">
<h3>温馨提示</h3>
<div>请携带身份证，注意安全</div>
</div>
`
}

function makeLink(){
build()
const data=encodeURIComponent(document.getElementById("output").innerHTML)
const url=location.origin+location.pathname+"?view=1&data="+data
prompt("复制链接",url)
}

function checkView(){
const p=new URLSearchParams(location.search)
if(p.get("view")==="1"){
document.querySelector(".top-bar").style.display="none"
document.getElementById("inputArea").style.display="none"
document.getElementById("output").innerHTML=decodeURIComponent(p.get("data"))
}
}

function exportImage(){

build()

const el=document.getElementById("output")
const qrBox=document.getElementById("qrcodeBox")
const canvasEl=document.getElementById("qrcode")

const data=encodeURIComponent(el.innerHTML)
const url=location.origin+location.pathname+"?view=1&data="+data

QRCode.toCanvas(canvasEl,url,function(){

qrBox.style.display="block"
el.appendChild(qrBox)

html2canvas(el,{scale:2,useCORS:true}).then(canvas=>{
const link=document.createElement("a")
link.download="行程海报.png"
link.href=canvas.toDataURL()
link.click()

qrBox.style.display="none"
})

})
}

createInputs()
checkView()

</script>

</body>
</html>
