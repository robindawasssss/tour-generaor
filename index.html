<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>旅游行程</title>

<style>
body{font-family:Microsoft YaHei;max-width:1100px;margin:auto;padding:20px;}
.card{margin:20px 0;border-bottom:1px solid #ddd;padding-bottom:20px;}
.spot-name{font-weight:bold;font-size:16px;margin:6px 0;}
.desc{line-height:1.7;margin:6px 0;}
.imgs{display:flex;gap:10px;margin:6px 0;}
.imgs img{width:320px;height:200px;object-fit:cover;border-radius:6px;}
button{padding:8px 16px;margin:10px 0;background:#2d8cf0;color:white;border:none;border-radius:6px;cursor:pointer;}
</style>
</head>

<body>

<h2>旅游行程</h2>
<div id="output"></div>
<button id="exportBtn">导出 Word</button>

<script>
let spotData={}, imageData={}, spotNames=[], finalHTML="";

async function loadData(){
    const spots = await fetch("spots.json").then(r=>r.json());
    const images = await fetch("images.json").then(r=>r.json());

    images.forEach(i=>imageData[i.name]=i.imageUrl);

    spots.forEach(s=>{
        spotData[s.name]={ content:s.content, img:imageData[s.name]||"https://picsum.photos/320/200?random="+Math.random() }
    });

    spotNames=Object.keys(spotData);
    buildFromUrl();
}

function fuzzyMatch(name){
    for(let k in spotData){
        if(k.includes(name)||name.includes(k)) return {name:k,...spotData[k]};
    }
    return null;
}

function buildFromUrl(){
    const params=new URLSearchParams(location.hash.substring(1));
    if(!params.toString()) return;

    let html="";
    params.forEach((v,k)=>{
        if(!k.startsWith("d")) return;
        const day=k.replace("d","");
        const spots=v.split(",");
        html+=`<div class="card"><h3>第${day}天</h3>`;
        spots.forEach((s,i)=>{
            const spot=fuzzyMatch(s);
            if(!spot){ html+=`<div>${s}</div>`; return; }
            let imgs="";
            if(spots.length==1||i<2){
                imgs=`<div class="imgs"><img src="${spot.img}"><img src="${spot.img}"></div>`;
            }
            html+=`<div class="spot-name">${spot.name}</div><div class="desc">${spot.content}</div>${imgs}`;
        });
        html+="</div>";
    });

    document.getElementById("output").innerHTML=html;
    finalHTML=html;
}

// 导出 Word
document.getElementById("exportBtn").onclick=function(){
    if(!finalHTML){ alert("暂无行程可导出"); return; }
    const wordContent=`
<html>
<head>
<meta charset="utf-8">
<style>
table{width:100%;border-collapse:collapse;margin:10px 0}
td{border:1px solid #000;padding:12px;vertical-align:top}
img{width:320px;height:200px;object-fit:cover;border-radius:6px}
.spot-name{font-weight:bold;font-size:16px;margin:6px 0}
.desc{line-height:1.7;margin-bottom:14px;text-align:justify}
</style>
</head>
<body>
<h3>旅游行程</h3>
${finalHTML.replace(/<div class="card"/g,'<table><tr><td>').replace(/<\/div>\s*$/,'</td></tr></table>')}
</body>
</html>
    `;
    const blob=new Blob([wordContent],{type:"application/msword"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="旅游行程表.doc";
    a.click();
}

loadData();
</script>

</body>
</html>
