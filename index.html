<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>旅游行程生成器</title>
<style>
body{font-family:Microsoft YaHei;max-width:1100px;margin:auto;padding:20px;}
input{padding:8px;width:200px;margin:6px;}
button{padding:8px 16px;margin:6px;background:#2d8cf0;color:white;border:none;border-radius:6px;cursor:pointer;}
.day-line{margin:10px 0;}
.suggest{background:#fff;border:1px solid #ddd;width:200px;position:absolute;z-index:10;}
.suggest div{padding:6px;cursor:pointer;}
.suggest div:hover{background:#eee;}
.card{margin:20px 0;border-bottom:1px solid #ddd;padding-bottom:20px;}
.spot-name{font-weight:bold;font-size:16px;margin:6px 0;}
.desc{line-height:1.7;margin:6px 0;}
.imgs{display:flex;gap:10px;margin:6px 0;}
.imgs img{width:320px;height:200px;object-fit:cover;border-radius:6px;}
#controls{margin-bottom:20px;}
</style>
</head>
<body>

<h2>旅游行程生成器</h2>

<div id="controls">
<label>行程天数：</label>
<input type="number" id="days" value="3">
<button id="genInputBtn">生成输入框</button>
<button id="genPlanBtn">生成行程</button>
<button id="exportBtn">导出 Word</button>
<button id="shareBtn">生成分享链接</button>
</div>

<div id="inputArea"></div>
<hr>
<div id="output"></div>

<script>
let spotData={}, imageData={}, spotNames=[], finalHTML="";

// 加载 JSON 数据
async function loadData(){
    try{
        const spots=await fetch("spots.json").then(r=>r.json());
        const images=await fetch("images.json").then(r=>r.json());

        images.forEach(i=>imageData[i.name]=i.imageUrl);

        spots.forEach(s=>{
            spotData[s.name]={content:s.content,img:imageData[s.name]||("https://picsum.photos/320/200?seed="+encodeURIComponent(s.name))};
        });

        spotNames=Object.keys(spotData);

        createInputs();
        buildFromUrl();

    } catch(e){
        console.error("JSON加载失败", e);
        alert("请检查 spots.json 和 images.json 是否存在或格式正确！");
    }
}

// 生成输入行
function createInputs(){
    const n=+document.getElementById("days").value;
    const area=document.getElementById("inputArea");
    area.innerHTML="";
    for(let i=1;i<=n;i++){
        area.innerHTML+=`
<div class="day-line">
<b>第${i}天：</b>
<input class="spotInput"><div class="suggest"></div>
<input class="spotInput"><div class="suggest"></div>
<input class="spotInput"><div class="suggest"></div>
</div>`;
    }
    bindSuggest();
}

// 模糊匹配
function fuzzyMatch(name){
    const clean = str => str.toLowerCase().replace(/\s+/g,'');
    for(let k in spotData){
        if(clean(k).includes(clean(name))||clean(name).includes(clean(k))){
            return {name:k,...spotData[k]};
        }
    }
    return null;
}

// 自动联想提示
function bindSuggest(){
    document.querySelectorAll(".spotInput").forEach(input=>{
        const box=input.nextElementSibling;
        input.addEventListener("input",()=>{
            const v=input.value.trim();
            if(!v){box.innerHTML="";return;}
            const list=spotNames.filter(n=>n.includes(v)).slice(0,6);
            box.innerHTML=list.map(n=>`<div>${n}</div>`).join("");
            box.querySelectorAll("div").forEach(i=>{
                i.onclick=()=>{
                    input.value=i.innerText;
                    box.innerHTML="";
                }
            });
        });
    });
}

// 生成行程
function build(){
    const lines=document.querySelectorAll(".day-line");
    let html="";
    lines.forEach((line,i)=>{
        const arr=[...line.querySelectorAll("input")].map(x=>x.value.trim()).filter(Boolean);
        if(!arr.length) return;
        html+=`<div class="card"><h3>第${i+1}天</h3>`;
        arr.forEach((a,idx)=>{
            const s=fuzzyMatch(a);
            if(!s){html+=`<div>${a}</div>`;return;}
            let imgs="";
            if(arr.length===1||idx<2){
                imgs=`<div class="imgs"><img src="${s.img}"><img src="${s.img}"></div>`;
            }
            html+=`<div class="spot-name">${s.name}</div><div class="desc">${s.content}</div>${imgs}`;
        });
        html+="</div>";
    });
    document.getElementById("output").innerHTML=html;
    finalHTML=html;
}

// 生成分享链接
function makeLink(){
    const lines=document.querySelectorAll(".day-line");
    let params=[];
    lines.forEach((line,i)=>{
        const arr=[...line.querySelectorAll("input")].map(x=>x.value.trim()).filter(Boolean);
        if(arr.length) params.push("d"+(i+1)+"="+arr.join(","));
    });
    const url=location.origin+location.pathname+"?"+params.join("&");
    prompt("复制链接",url);
}

// 从 URL 自动生成行程
function buildFromUrl(){
    const params=new URLSearchParams(location.search);
    if(!params.toString()) return;
    let html="";
    params.forEach((v,k)=>{
        if(!k.startsWith("d")) return;
        const day=k.replace("d","");
        const spots=v.split(",");
        html+=`<div class="card"><h3>第${day}天</h3>`;
        spots.forEach((s,i)=>{
            const spot=fuzzyMatch(s);
            if(!spot){html+=`<div>${s}</div>`;return;}
            let imgs="";
            if(spots.length===1||i<2){
                imgs=`<div class="imgs"><img src="${spot.img}"><img src="${spot.img}"></div>`;
            }
            html+=`<div class="spot-name">${spot.name}</div><div class="desc">${spot.content}</div>${imgs}`;
        });
        html+="</div>";
    });
    if(html){
        document.getElementById("output").innerHTML=html;
        finalHTML=html;
        // 隐藏控件分享模式
        document.getElementById("controls").style.display="none";
        document.getElementById("inputArea").style.display="none";
    }
}

// 导出 Word
function exportWord(){
    if(!finalHTML){alert("请先生成行程");return;}
    const wordContent=`
<html>
<head>
<meta charset="utf-8">
<style>
table{width:100%;border-collapse:collapse;margin:10px 0}
td{border:1px solid #000;padding:12px;vertical-align:top}
img{width:320px;height:200px;object-fit:cover;border-radius:6px}
.spot-name{font-weight:bold;font-size:16px;margin:6px 0}
.desc{line-height:1.7;margin-bottom:14px;text-align:justify}
</style>
</head>
<body>
<h3>旅游行程</h3>
${finalHTML.replace(/<div class="card"/g,'<table><tr><td>').replace(/<\/div>\s*$/,'</td></tr></table>')}
</body>
</html>
    `;
    const blob=new Blob([wordContent],{type:"application/msword"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="旅游行程.doc";
    a.click();
}

// 事件绑定
window.onload=async function(){
    await loadData();
    document.getElementById("genInputBtn").onclick=createInputs;
    document.getElementById("genPlanBtn").onclick=build;
    document.getElementById("shareBtn").onclick=makeLink;
    document.getElementById("exportBtn").onclick=exportWord;
};
</script>

</body>
</html>
