<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>旅游行程生成器</title>

<style>

body{
font-family:Microsoft YaHei;
max-width:1100px;
margin:auto;
padding:20px;
}

input{
padding:8px;
width:200px;
margin:6px;
}

button{
padding:8px 16px;
margin:6px;
background:#2d8cf0;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.day-line{
margin:10px 0;
}

.suggest{
background:#fff;
border:1px solid #ddd;
width:200px;
position:absolute;
z-index:10;
}

.suggest div{
padding:6px;
cursor:pointer;
}

.suggest div:hover{
background:#eee;
}

.card{
margin:20px 0;
border-bottom:1px solid #ddd;
padding-bottom:20px;
}

.spot-name{
font-weight:bold;
font-size:16px;
margin:6px 0;
}

.desc{
line-height:1.7;
margin:6px 0;
}

.imgs{
display:flex;
gap:10px;
}

.imgs img{
width:320px;
height:200px;
object-fit:cover;
border-radius:6px;
}

</style>
</head>

<body>

<h2>旅游行程生成器</h2>

<label>行程天数</label>
<input type="number" id="days" value="3">

<button onclick="createInputs()">生成输入框</button>
<button onclick="build()">生成行程</button>
<button onclick="makeLink()">生成分享链接</button>

<div id="inputArea"></div>

<hr>

<div id="output"></div>

<script>

let spotData={}
let imageData={}
let spotNames=[]

async function loadData(){

const spots=await fetch("spots.json").then(r=>r.json())
const images=await fetch("images.json").then(r=>r.json())

images.forEach(i=>{
imageData[i.name]=i.imageUrl
})

spots.forEach(s=>{

spotData[s.name]={
content:s.content,
img:imageData[s.name]||"https://picsum.photos/320/200?random="+Math.random()
}

})

spotNames=Object.keys(spotData)

createInputs()

buildFromUrl()

}

function createInputs(){

const n=document.getElementById("days").value

const area=document.getElementById("inputArea")

area.innerHTML=""

for(let i=1;i<=n;i++){

area.innerHTML+=`
<div class="day-line">
第${i}天
<div>
<input class="spotInput">
<div class="suggest"></div>
<input class="spotInput">
<div class="suggest"></div>
<input class="spotInput">
<div class="suggest"></div>
</div>
</div>
`

}

bindSuggest()

}

function bindSuggest(){

document.querySelectorAll(".spotInput").forEach(input=>{

const box=input.nextElementSibling

input.addEventListener("input",()=>{

const v=input.value.trim()

if(v.length<1){

box.innerHTML=""
return

}

const list=spotNames.filter(n=>n.includes(v)).slice(0,6)

box.innerHTML=list.map(n=>`<div>${n}</div>`).join("")

box.querySelectorAll("div").forEach(i=>{

i.onclick=()=>{

input.value=i.innerText
box.innerHTML=""

}

})

})

})

}

function fuzzyMatch(name){

for(let k in spotData){

if(k.includes(name)||name.includes(k)){

return {name:k,...spotData[k]}

}

}

return null

}

function build(){

const lines=document.querySelectorAll(".day-line")

const out=document.getElementById("output")

let html=""

lines.forEach((line,i)=>{

const arr=[...line.querySelectorAll("input")]
.map(x=>x.value.trim())
.filter(Boolean)

if(arr.length===0)return

html+=`<div class="card"><h3>第${i+1}天</h3>`

arr.forEach((a,idx)=>{

const s=fuzzyMatch(a)

if(!s){

html+=`<div>${a}</div>`
return

}

let imgs=""

if(arr.length===1||idx<2){

imgs=`
<div class="imgs">
<img src="${s.img}">
<img src="${s.img}">
</div>
`

}

html+=`

<div class="spot-name">${s.name}</div>
<div class="desc">${s.content}</div>
${imgs}

`

})

html+="</div>"

})

out.innerHTML=html

}

function makeLink(){

const lines=document.querySelectorAll(".day-line")

let params=[]

lines.forEach((line,i)=>{

const arr=[...line.querySelectorAll("input")]
.map(x=>x.value.trim())
.filter(Boolean)

if(arr.length){

params.push("d"+(i+1)+"="+arr.join(","))

}

})

const url=location.origin+location.pathname+"?"+params.join("&")

prompt("复制链接",url)

}

function buildFromUrl(){

const params=new URLSearchParams(location.search)

if(!params.toString()) return

let html=""

params.forEach((v,k)=>{

if(!k.startsWith("d")) return

const day=k.replace("d","")

const spots=v.split(",")

html+=`<div class="card"><h3>第${day}天</h3>`

spots.forEach((s,i)=>{

const spot=fuzzyMatch(s)

if(!spot){

html+=`<div>${s}</div>`
return

}

let imgs=""

if(spots.length==1||i<2){

imgs=`
<div class="imgs">
<img src="${spot.img}">
<img src="${spot.img}">
</div>
`

}

html+=`

<div class="spot-name">${spot.name}</div>
<div class="desc">${spot.content}</div>
${imgs}

`

})

html+="</div>"

})

document.getElementById("output").innerHTML=html

}

loadData()

</script>

</body>
</html>
