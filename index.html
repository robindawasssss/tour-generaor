<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>专业旅游行程生成器（手机可访问版）</title>
<style>
  *{box-sizing:border-box}
  body{font-family:Microsoft YaHei;padding:20px;max-width:1200px;margin:auto}
  input{padding:8px;width:220px;margin:6px 4px}
  button{padding:10px 18px;background:#2d8cf0;color:#fff;border:none;border-radius:6px;cursor:pointer;margin-right:10px;margin-top:10px}
  .day-line{margin:12px 0;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .card{margin:20px 0}
  .day{font-size:18px;font-weight:bold;margin-bottom:10px}
  .spot-name{font-weight:bold;font-size:16px;margin:6px 0}
  .desc{line-height:1.7;margin-bottom:14px;text-align:justify}
  .imgs{display:flex;gap:10px;margin-bottom:20px}
  .imgs img{width:320px;height:200px;object-fit:cover;border-radius:6px}
  .tip{color:#666;font-size:14px;margin:10px 0}
  .match-tip{color:#2d8cf0;font-size:13px;margin:5px 0}
  .loading{color:#999;font-size:14px;margin:10px 0;padding:10px;background:#f5f5f5;border-radius:4px}
  .config-area{margin:15px 0;padding:10px;border:1px solid #eee;border-radius:6px}
</style>
</head>
<body>

<h2>专业旅游行程生成器（手机可访问版）</h2>
<div class="tip">提示：1. 支持模糊输入；2. 图片为实景图；3. 导出 Word 固定尺寸；4. 可生成访问链接</div>

<div class="config-area">
  <label>行程天数：</label>
  <input type="number" id="days" value="3" min="1" style="width:80px">
  <button onclick="createInputs()">生成输入行</button>
</div>

<div class="loading" id="loadingStatus">⏳ 正在加载景点数据...</div>

<div id="mainContent" style="display:none">
  <div id="inputArea" style="margin:20px 0"></div>
  <button onclick="build()">生成行程</button>
  <button onclick="downloadWord()">导出 Word（表格+固定图片）</button>
  <button onclick="generateAccessLink()">生成访问链接</button>
  <div id="output" style="margin-top:30px"></div>
</div>

<script>
let allSpotData = {}; // 存储所有景点数据

// 页面加载时读取 JSON
window.onload = loadData;

async function loadData() {
  const loadingEl = document.getElementById('loadingStatus');
  try {
    // 读取景点 JSON
    const res1 = await fetch('spots.json');
    const spots = await res1.json();

    // 读取图片 JSON
    const res2 = await fetch('images.json');
    const images = await res2.json();

    // 图片映射
    const imgMap = {};
    images.forEach(item=>{
      imgMap[item.name] = { img1:item.img1, img2:item.img2 };
    });

    // 构建 allSpotData
    allSpotData = {};
    spots.forEach(item=>{
      const nameKey = item.id.split(',')[0].trim();
      let desc = ((item.name.first||'') + ' ' + (item.name.last||'')).trim();
      if(!desc){
        desc = item.id.replace(nameKey,'').replace(/^,|^：/,'').trim();
      }
      const imgs = imgMap[nameKey] || {
        img1:`https://picsum.photos/seed/${encodeURIComponent(nameKey)}_1/320/200`,
        img2:`https://picsum.photos/seed/${encodeURIComponent(nameKey)}_2/320/200`
      };
      allSpotData[nameKey] = {
        desc: desc || '暂无该景点的专业描述',
        img1: imgs.img1,
        img2: imgs.img2,
        fullId: item.id
      };
    });

    loadingEl.textContent = `✅ 数据加载完成，共 ${Object.keys(allSpotData).length} 个景点`;
    document.getElementById('mainContent').style.display='block';
    createInputs();
  } catch(e){
    loadingEl.textContent = '❌ 数据加载失败，请检查 spots.json 和 images.json 是否存在';
    console.error(e);
  }
}

// 生成每天 3 个输入框
function createInputs(){
  const n = +document.getElementById('days').value;
  const area = document.getElementById('inputArea');
  area.innerHTML = '';
  for(let i=1;i<=n;i++){
    area.innerHTML += `<div class="day-line">
      <b>第${i}天：</b>
      <input class="p1" placeholder="景点1（可模糊输入）">
      <input class="p2" placeholder="景点2（可模糊输入）">
      <input class="p3" placeholder="景点3（可模糊输入）">
    </div>`;
  }
}

// 模糊匹配
function fuzzyMatchSpot(inputName){
  if(!inputName.trim()) return null;
  const input = inputName.trim().toLowerCase().replace(/\s+/g,'');
  for(const name of Object.keys(allSpotData)){
    const key = name.toLowerCase().replace(/\s+/g,'');
    const full = (allSpotData[name].fullId||'').toLowerCase();
    if(key.includes(input) || input.includes(key) || full.includes(input)){
      return {name,...allSpotData[name]};
    }
  }
  return null;
}

// 生成行程
function build(){
  const lines = document.querySelectorAll('.day-line');
  const out = document.getElementById('output');
  let html='';
  lines.forEach((line,idx)=>{
    const p1=line.querySelector('.p1').value.trim();
    const p2=line.querySelector('.p2').value.trim();
    const p3=line.querySelector('.p3').value.trim();
    const inputs=[p1,p2,p3].filter(Boolean);
    if(inputs.length===0) return;

    html += `<div class="card"><div class="day">第${idx+1}天</div>`;

    // 描述
    inputs.forEach(input=>{
      const matched = fuzzyMatchSpot(input);
      if(matched){
        html += `<div style="margin-bottom:12px">
          <div class="spot-name">${matched.name}</div>
          <div class="match-tip">✅ 已匹配到景点：${matched.name}</div>
          <div class="desc">${matched.desc}</div>
        </div>`;
      }else{
        html += `<div style="margin-bottom:12px">
          <div class="spot-name">${input}</div>
          <div class="match-tip" style="color:#ff4d4f">❌ 未匹配到对应景点，请检查名称</div>
          <div class="desc">暂无该景点的专业描述</div>
        </div>`;
      }
    });

    // 图片逻辑
    let imgsHtml='<div class="imgs">';
    if(inputs.length===1){
      const matched=fuzzyMatchSpot(inputs[0]);
      const img1=matched?matched.img1:'https://picsum.photos/seed/default1/320/200';
      const img2=matched?matched.img2:'https://picsum.photos/seed/default2/320/200';
      imgsHtml += `<img src="${img1}"><img src="${img2}">`;
    }else{
      for(let i=0;i<2;i++){
        const matched=fuzzyMatchSpot(inputs[i]);
        const img = matched?matched.img1:'https://picsum.photos/seed/default1/320/200';
        imgsHtml += `<img src="${img}">`;
      }
    }
    imgsHtml+='</div>';
    html += imgsHtml+'</div>';
  });
  out.innerHTML = html;
  window.finalHTML = html;
}

// 导出 Word
function downloadWord(){
  if(!window.finalHTML){alert('请先生成行程'); return;}
  const wordContent = `
<html>
<head>
<meta charset="utf-8">
<style>
table{width:100%;border-collapse:collapse;margin:10px 0}
td{border:1px solid #000;padding:12px;vertical-align:top}
img{width:320px;height:200px;object-fit:cover;border-radius:6px}
.spot-name{font-weight:bold;font-size:16px;margin:6px 0}
.desc{line-height:1.7;margin-bottom:14px;text-align:justify}
.match-tip{color:#2d8cf0;font-size:13px;margin:5px 0}
</style>
</head>
<body>
<h3>旅游行程单</h3>
${window.finalHTML.replace(/<div class="card"/g,'<table><tr><td').replace(/<\/div>\s*$/,'</td></tr></table>')}
</body>
</html>
  `;
  const blob = new Blob([wordContent],{type:'application/msword'});
  const a=document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '旅游行程表.doc';
  a.click();
}

// 生成访问链接
function generateAccessLink(){
  if(!window.finalHTML){alert("请先生成行程");return;}
  const htmlContent = `
  <html>
  <head>
  <meta charset="utf-8">
  <title>我的旅游行程</title>
  <style>
    body{font-family:Microsoft YaHei;padding:20px;max-width:1200px;margin:auto}
    .day{font-size:18px;font-weight:bold;margin-bottom:10px}
    .spot-name{font-weight:bold;font-size:16px;margin:6px 0}
    .desc{line-height:1.7;margin-bottom:14px;text-align:justify}
    .imgs{display:flex;gap:10px;margin-bottom:20px}
    .imgs img{width:320px;height:200px;object-fit:cover;border-radius:6px}
  </style>
  </head>
  <body>
  ${window.finalHTML}
  </body>
  </html>
  `;
  const blob = new Blob([htmlContent], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.target = '_blank';
  a.textContent = '点击打开行程页面';
  a.style.display='block';
  a.style.margin='10px 0';
  document.getElementById('output').appendChild(a);
  alert("访问链接已生成，页面下方出现点击链接");
}
</script>
</body>
</html>
