<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>旅游行程生成器</title>
<style>
body{font-family:Microsoft YaHei;max-width:1100px;margin:auto;padding:20px}
input{padding:8px;width:220px;margin:6px}
button{padding:8px 16px;margin:6px;background:#2d8cf0;color:#fff;border:none;border-radius:6px;cursor:pointer}
.day-line{margin:10px 0}
.card{margin:20px 0;border-bottom:1px solid #ddd;padding-bottom:20px}
.spot-name{font-weight:bold;font-size:16px;margin:6px 0}
.desc{line-height:1.7;margin:6px 0}
.imgs{display:flex;gap:10px}
.imgs img{width:320px;height:200px;object-fit:cover;border-radius:6px}
.loading{color:#888;margin:10px 0}
</style>
</head>

<body>

<h2>旅游行程生成器</h2>
<div class="loading" id="loading">加载数据中...</div>

<div id="main" style="display:none">

<label>行程天数：</label>
<input type="number" id="days" value="3">
<button onclick="createInputs()">生成输入框</button>

<div id="inputArea"></div>

<button onclick="build()">生成行程</button>

<div id="output"></div>

</div>

<script>

let spotData={}
let imageData={}

async function loadData(){

try{

const spotRes=await fetch('spots.json')
const spots=await spotRes.json()

const imgRes=await fetch('images.json')
const images=await imgRes.json()

images.forEach(i=>{
imageData[i.name]=i.imageUrl
})

spots.forEach(s=>{

spotData[s.name]={
content:s.content,
img:imageData[s.name]||null
}

})

document.getElementById("loading").innerText="数据加载完成："+Object.keys(spotData).length+" 个景点"
document.getElementById("main").style.display="block"

createInputs()

}catch(e){

document.getElementById("loading").innerText="加载失败："+e

}

}

function fuzzyMatch(name){

const keys=Object.keys(spotData)

for(let k of keys){

if(k.includes(name)||name.includes(k)){
return {name:k,...spotData[k]}
}

}

return null

}

function createInputs(){

const n=+document.getElementById("days").value
const area=document.getElementById("inputArea")

area.innerHTML=""

for(let i=1;i<=n;i++){

area.innerHTML+=`
<div class="day-line">
第${i}天：
<input class="p1" placeholder="景点1">
<input class="p2" placeholder="景点2">
<input class="p3" placeholder="景点3">
</div>
`

}

}

function build(){

const lines=document.querySelectorAll(".day-line")
const out=document.getElementById("output")

let html=""

lines.forEach((line,i)=>{

const p1=line.querySelector(".p1").value
const p2=line.querySelector(".p2").value
const p3=line.querySelector(".p3").value

const arr=[p1,p2,p3].filter(Boolean)

if(arr.length===0)return

html+=`<div class="card"><h3>第${i+1}天</h3>`

arr.forEach((a,idx)=>{

const s=fuzzyMatch(a)

if(!s){
html+=`<div>${a} 未找到</div>`
return
}

let imgHtml=""

if(arr.length===1||idx<2){

const img=s.img||"https://picsum.photos/320/200?random="+Math.random()

imgHtml=`
<div class="imgs">
<img src="${img}">
<img src="${img}">
</div>
`

}

html+=`
<div>
<div class="spot-name">${s.name}</div>
<div class="desc">${s.content}</div>
${imgHtml}
</div>
`

})

html+="</div>"

})

out.innerHTML=html

}

loadData()

</script>

</body>
</html>
