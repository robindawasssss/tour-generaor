<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>旅游行程生成器</title>
<style>
body{font-family:"Microsoft YaHei";background:#f5f7fa;margin:0;padding:30px;}
h2{margin-bottom:20px;text-align:center;color:#2c3e50;}
.top-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
input,select{padding:8px;border:1px solid #dcdfe6;border-radius:6px;}
button{padding:8px 16px;background:#409eff;color:#fff;border:none;border-radius:6px;cursor:pointer;}
button.secondary{background:#67c23a;}
button.gray{background:#909399;}
.card{background:#fff;border-radius:10px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.day-title{font-weight:bold;margin-bottom:10px;}
.row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.row input{flex:1;min-width:150px;}
.inline{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.imgs{display:flex;gap:10px;margin:6px 0;justify-content:center;}
.imgs img{width:48%;height:180px;object-fit:cover;border-radius:6px;}
.suggest{background:#fff;border:1px solid #ddd;position:absolute;z-index:10;width:200px;}
.suggest div{padding:6px;cursor:pointer;}
.suggest div:hover{background:#eee;}
</style>
</head>
<body>
<h2>旅游行程生成器</h2>

<div class="top-bar">
<label>行程天数</label>
<input type="number" id="days" value="3">
<button onclick="createInputs()">生成输入框</button>
<div style="flex:1"></div>
<button class="secondary" onclick="build()">生成行程</button>
<button class="gray" onclick="makeLink()">生成链接</button>
<button onclick="exportWord()">导出 Word</button>
</div>

<div id="inputArea"></div>
<hr>
<div id="output"></div>

<script>
// ===== 全局变量 =====
let spotData={}, imageData={}, spotNames=[];

// ===== 加载 JSON 数据 =====
async function loadData(){
    const spots = await fetch("spots.json").then(r=>r.json());
const images = await fetch("images.json").then(r=>r.json());

// 先生成 imageData
images.forEach(i => { imageData[i.name] = i.imageUrl; });

// 再生成 spotData
spots.forEach(s => {
  spotData[s.name] = {
    content: s.content,
    img: imageData[s.name] || "https://picsum.photos/320/200?random=" + Math.random()
  };
});

spotNames = Object.keys(spotData);
    createInputs();
    bindSuggest();
    buildFromUrl();
}

// ===== 生成输入框 =====
function createInputs(){
    const n=document.getElementById("days").value;
    const area=document.getElementById("inputArea");
    area.innerHTML="";
    for(let i=1;i<=n;i++){
        area.innerHTML+=`
        <div class="card day-line">
            <div class="day-title">第${i}天</div>
            <div class="row">
                <input class="spotInput" placeholder="景点1"><div class="suggest"></div>
                <input class="spotInput" placeholder="景点2"><div class="suggest"></div>
                <input class="spotInput" placeholder="景点3"><div class="suggest"></div>
            </div>
            <div class="inline">
                <label>用餐</label>
                <select>
                  <option>/</option>
                    <option>早</option>
                    <option>早中</option>
                    <option>早中晚</option>
                    <option>中晚</option>
                    <option>晚</option>
                </select>
                <label>住宿</label>
                <input placeholder="输入住宿">
                <label>酒店</label>
                <input placeholder="输入酒店">
            </div>
        </div>`;
    }
    bindSuggest();
}

// ===== 模糊搜索提示 =====
function bindSuggest(){
    document.querySelectorAll(".spotInput").forEach(input=>{
        const box=input.nextElementSibling;
        input.addEventListener("input",()=>{
            const v=input.value.trim();
            if(!v){ box.innerHTML=""; return; }
            const list=spotNames.filter(n=>n.includes(v)).slice(0,6);
            box.innerHTML=list.map(n=>`<div>${n}</div>`).join("");
            box.querySelectorAll("div").forEach(div=>{
                div.onclick=()=>{
                    input.value=div.innerText;
                    box.innerHTML="";
                };
            });
        });
    });
}

// ===== fuzzy 查找 =====
function fuzzyMatch(name){
    name = name.trim();
    if(!name) return null;

    function commonCharsCount(a, b){
        const aArr = a.split('');
        const bArr = b.split('');
        let count = 0;
        const used = [];
        for(let c of aArr){
            const idx = bArr.findIndex((ch,i)=>ch===c && !used[i]);
            if(idx !== -1){
                count++;
                used[idx] = true;
            }
        }
        return count;
    }

    for(let k in spotData){
        if(commonCharsCount(name, k) >= 3){
            return {
                name: k,
                content: spotData[k].content,
                img: imageData[k] || spotData[k].img || "https://picsum.photos/320/200?random=" + Math.random()
            };
        }
    }

    return null;
}

// ===== 构建行程 =====
function build(){
    const lines=document.querySelectorAll(".day-line");
    const out=document.getElementById("output");
    let html="";
    lines.forEach((line,i)=>{
        const arr=[...line.querySelectorAll(".spotInput")].map(x=>x.value.trim()).filter(Boolean);
        if(arr.length===0) return;
        const selects=line.querySelectorAll("select");
        const meals=selects[0].value;
        const stay=line.querySelectorAll("input")[3].value;
        const hotel=line.querySelectorAll("input")[4].value;

        html+=`<div class="card"><h3>第${i+1}天</h3>`;
        arr.forEach((a,idx)=>{
            const s=fuzzyMatch(a);
            if(!s){ html+=`<div>${a}</div>`; return; }
            let imgs="";
            if(arr.length>=1){
                imgs=`<div class="imgs">
                    <img src="${s.img}" style="width:48%;height:auto;max-height:180px;object-fit:cover;">
                    <img src="${s.img}" style="width:48%;height:auto;max-height:180px;object-fit:cover;">
                </div>`;
            }
            html+=`<div class="spot-name">${s.name}</div>
                   <div class="desc">${s.content}</div>${imgs}`;
        });
        html+=`<div class="extra-line">用餐：${meals}</div>
<div class="extra-line">住宿：${stay}</div>
<div class="extra-line">酒店：${hotel}</div>`;
        html+="</div>";
    });
    out.innerHTML=html;
}

// ===== 分享链接 =====
function makeLink(){
    build();
    const data=encodeURIComponent(document.getElementById("output").innerHTML);
    const url=location.origin+location.pathname+"?view=1&data="+data;
    prompt("复制链接",url);
}

// ===== 分享链接显示 =====
function buildFromUrl(){
    const params=new URLSearchParams(location.search);
    if(!params.toString()) return;
    if(params.get("view")!=="1") return;
    document.querySelector(".top-bar").style.display="none";
    document.getElementById("inputArea").style.display="none";
    document.getElementById("output").innerHTML=decodeURIComponent(params.get("data"));
}

// ===== Word 导出（图片自动缩放适应页面） =====
function exportWord(){
let content=document.getElementById("output").innerHTML
// 图片转换为 Word 兼容 table
content=content.replace(/<div class="imgs">([\s\S]*?)<\/div>/g,function(match){
const imgs=[...match.matchAll(/src="(.*?)"/g)]
if(imgs.length<2) return ""
const img1=imgs[0][1]
const img2=imgs[1][1]
return `
<table style="width:100%;margin:8px 0;border-collapse:collapse;">
<tr>
<td style="width:50%;text-align:center;border:none;">
<img src="${img1}" width="300" height="130">
</td>
<td style="width:50%;text-align:center;border:none;">
<img src="${img2}" width="300" height="130">
</td>
</tr>
</table>
`
})
// 每天自动分页
content = content.replace(/<div class="card">/g,'<div class="card" style="page-break-after:always;">')
// 先统一 class，保证后面合并匹配到
content = content.replace(/class="desc"/g,'class="desc word-desc"')
// 景点名称 + 描述合并成一行，名称加粗并蓝色
content = content.replace(/<div class="spot-name">([\s\S]*?)<\/div>\s*<div class="desc word-desc">([\s\S]*?)<\/div>/g,
    function(match, name, desc){
        return `<div class="desc word-desc"><span style="font-weight:bold; color:#2d8cf0;">【${name}】</span>${desc}</div>`;
    }
);
content = content.replace(/<div class="card">([\s\S]*?)<\/div>/g, function(card){

    // ✅ 提取（匹配真实结构）
    let meal = (card.match(/<div>\s*用餐[:：]([\s\S]*?)<\/div>/) || [,""])[1];
    let stay = (card.match(/<div>\s*住宿[:：]([\s\S]*?)<\/div>/) || [,""])[1];
    let hotel = (card.match(/<div>\s*酒店[:：]([\s\S]*?)<\/div>/) || [,""])[1];

    // ✅ 删除原内容（关键！）
    card = card.replace(/<div>\s*用餐[:：][\s\S]*?<\/div>/g,'');
    card = card.replace(/<div>\s*住宿[:：][\s\S]*?<\/div>/g,'');
    card = card.replace(/<div>\s*酒店[:：][\s\S]*?<\/div>/g,'');

    // ✅ 组合
    let arr = [];
    if(meal && meal.trim()) arr.push(`用餐：${meal.trim()}`);
    if(stay && stay.trim()) arr.push(`住宿：${stay.trim()}`);
    if(hotel && hotel.trim()) arr.push(`酒店：${hotel.trim()}`);

    let rightText = arr.join("　　");

    // ✅ 插入标题
    card = card.replace(/<h3>([\s\S]*?)<\/h3>/, function(match, title){
        if(!rightText) return `<h3 class="day-title">${title}</h3>`;

        return `<h3 class="day-title">
        <span style="float:left;">${title}</span>
        <span style="float:right;font-size:14px;font-weight:normal;">${rightText}</span>
        <div style="clear:both;"></div>
        </h3>`;
    });

    return card;
});



// 描述缩进
content=content.replace(/class="desc"/g,'class="desc word-desc"')
const style=`
<style>
@page{
size:A4;
}
body{
font-family:SimSun;
line-height:1.7;
margin:0;
}
#word-container{
width:19.2cm;
margin-left:-1.2cm;
}
.day-title{
background:#2d8cf0;
color:#fff;
padding:6px 10px;
font-size:18px;
}
.spot-name{
font-weight:bold;
font-size:15px;
margin-top:10px;
}
.word-desc{
margin-top:4px;
text-indent:2em;
}
.extra-line{
margin-top:10px;
padding:6px 8px;
background:#f6f6f6;
border-left:3px solid #2d8cf0;
}
.summary-box{
margin-bottom:20px;
padding:10px;
background:#eef4ff;
border-left:4px solid #2d8cf0;
}
</style>
`
const html=`
<html>
<head>
<meta charset="utf-8">
${style}
</head>
<body>
<div id="word-container">
${content}
</div>
</body>
</html>
`
const blob=new Blob(['\ufeff',html],{type:'application/msword'})
const url=URL.createObjectURL(blob)
const a=document.createElement("a")
a.href=url
a.download="旅游行程.doc"
document.body.appendChild(a)
a.click()
document.body.removeChild(a)
}
// ===== 初始化 =====
loadData();
</script>
</body>
</html>
