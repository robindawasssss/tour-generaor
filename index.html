<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>旅游行程生成器</title>
<style>
body{font-family:Microsoft YaHei;max-width:1100px;margin:auto;padding:20px;}
.card{margin:20px 0;border-bottom:1px solid #ddd;padding-bottom:20px;}
.spot-name{font-weight:bold;font-size:16px;margin:6px 0;}
.desc{line-height:1.7;margin:6px 0;}
.imgs{display:flex;gap:10px;margin:6px 0;}
.imgs img{width:320px;height:200px;object-fit:cover;border-radius:6px;}
#controls{margin-bottom:20px;}
input{padding:6px 10px;width:100px;margin-right:10px;}
button{padding:8px 16px;margin-right:10px;background:#2d8cf0;color:white;border:none;border-radius:6px;cursor:pointer;}
.day-line{margin:12px 0;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
</style>
</head>
<body>

<h2>旅游行程</h2>

<!-- 调试控件 -->
<div id="controls">
  <label>行程天数：</label>
  <input type="number" id="days" value="3" min="1">
  <button id="generateBtn">生成行程</button>
  <button id="exportBtn">导出 Word</button>
</div>

<!-- 输入行 -->
<div id="inputArea"></div>

<!-- 输出 -->
<div id="output"></div>

<script>
let spotData={}, imageData={}, finalHTML="";

// 加载 JSON 数据
async function loadData(){
    try{
        const spots = await fetch("spots.json").then(r=>r.json());
        const images = await fetch("images.json").then(r=>r.json());

        images.forEach(i=>imageData[i.name]=i.imageUrl);

        spots.forEach(s=>{
            spotData[s.name]={ content:s.content, img:imageData[s.name]||("https://picsum.photos/320/200?seed="+encodeURIComponent(s.name)) }
        });

    } catch(e){
        console.error("JSON 加载失败", e);
        alert("加载 JSON 数据失败，请检查路径或格式！");
    }
}

// 模糊匹配景点
function fuzzyMatch(name){
    for(let k in spotData){
        if(k.includes(name)||name.includes(k)) return {name:k,...spotData[k]};
    }
    return null;
}

// 根据 URL hash 生成行程
function buildFromUrl(){
    const params=new URLSearchParams(location.hash.substring(1));
    if(!params.toString()) return false;

    let html="";
    params.forEach((v,k)=>{
        if(!k.startsWith("d")) return;
        const day=k.replace("d","");
        const spots=v.split(",");
        html+=`<div class="card"><h3>第${day}天</h3>`;
        spots.forEach((s,i)=>{
            const spot=fuzzyMatch(s.trim());
            if(!spot){ html+=`<div class="spot-name">${s}</div><div class="desc">暂无描述</div>`; return; }
            let imgs="";
            if(spots.length===1||i<2) imgs=`<div class="imgs"><img src="${spot.img}"><img src="${spot.img}"></div>`;
            html+=`<div class="spot-name">${spot.name}</div><div class="desc">${spot.content}</div>${imgs}`;
        });
        html+="</div>";
    });

    document.getElementById("output").innerHTML=html;
    finalHTML=html;
    return true;
}

// 生成手动输入行
function createInputs(){
    const n = +document.getElementById("days").value;
    const area = document.getElementById("inputArea");
    area.innerHTML="";
    for(let i=1;i<=n;i++){
        area.innerHTML+=`<div class="day-line">
            <b>第${i}天：</b>
            <input class="p1" placeholder="景点1">
            <input class="p2" placeholder="景点2">
            <input class="p3" placeholder="景点3">
        </div>`;
    }
}

// 手动生成行程
function generateManual(){
    const lines = document.querySelectorAll(".day-line");
    let html="";
    lines.forEach((line, idx)=>{
        const inputs=[line.querySelector(".p1").value,line.querySelector(".p2").value,line.querySelector(".p3").value].filter(Boolean);
        if(!inputs.length) return;
        html+=`<div class="card"><h3>第${idx+1}天</h3>`;
        inputs.forEach((input,i)=>{
            const spot=fuzzyMatch(input.trim());
            if(spot){
                let imgs="";
                if(inputs.length===1||i<2) imgs=`<div class="imgs"><img src="${spot.img}"><img src="${spot.img}"></div>`;
                html+=`<div class="spot-name">${spot.name}</div><div class="desc">${spot.content}</div>${imgs}`;
            }else{
                html+=`<div class="spot-name">${input}</div><div class="desc">暂无描述</div>`;
            }
        });
        html+="</div>";
    });
    document.getElementById("output").innerHTML=html;
    finalHTML=html;
}

// 导出 Word
function exportWord(){
    if(!finalHTML) { alert("请先生成行程"); return; }
    const wordContent=`
<html>
<head>
<meta charset="utf-8">
<style>
table{width:100%;border-collapse:collapse;margin:10px 0}
td{border:1px solid #000;padding:12px;vertical-align:top}
img{width:320px;height:200px;object-fit:cover;border-radius:6px}
.spot-name{font-weight:bold;font-size:16px;margin:6px 0}
.desc{line-height:1.7;margin-bottom:14px;text-align:justify}
</style>
</head>
<body>
<h3>旅游行程</h3>
${finalHTML.replace(/<div class="card"/g,'<table><tr><td>').replace(/<\/div>\s*$/,'</td></tr></table>')}
</body>
</html>
    `;
    const blob=new Blob([wordContent],{type:"application/msword"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="旅游行程表.doc";
    a.click();
}

window.onload = async function(){
    await loadData();

    // 先尝试从 URL hash 生成
    if(buildFromUrl()){
        document.getElementById("controls").style.display="none";
        document.getElementById("inputArea").style.display="none";
    }else{
        document.getElementById("controls").style.display="block";
        document.getElementById("inputArea").style.display="block";
        createInputs();
    }

    document.getElementById("generateBtn").onclick=generateManual;
    document.getElementById("exportBtn").onclick=exportWord;
};
</script>

</body>
</html>
