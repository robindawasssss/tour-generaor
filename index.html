<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>专业旅游行程生成器</title>
<style>
*{box-sizing:border-box}
body{font-family:Microsoft YaHei;padding:20px;max-width:1200px;margin:auto}
input{padding:8px;width:220px;margin:6px 4px}
button{padding:10px 18px;background:#2d8cf0;color:#fff;border:none;border-radius:6px;cursor:pointer;margin-right:10px;margin-top:10px}
.day-line{margin:12px 0;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.card{margin:20px 0}
.day{font-size:18px;font-weight:bold;margin-bottom:10px}
.spot-name{font-weight:bold;font-size:16px;margin:6px 0}
.desc{line-height:1.7;margin-bottom:14px;text-align:justify}
.imgs{display:flex;gap:10px}
.imgs img{width:320px;height:200px;object-fit:cover;border-radius:6px}
.tip{color:#666;font-size:14px;margin:10px 0}
.match-tip{color:#2d8cf0;font-size:13px;margin:5px 0}
.loading{color:#999;font-size:14px;margin:10px 0;padding:10px;background:#f5f5f5;border-radius:4px}
.config-area{margin:15px 0;padding:10px;border:1px solid #eee;border-radius:6px}
</style>
</head>
<body>

<h2>专业旅游行程生成器</h2>
<div class="tip">提示：1. 支持模糊输入；2. 图片为实景图；3. 导出Word固定尺寸</div>

<div class="loading" id="loadingStatus">⏳ 正在加载景点数据...</div>

<div id="mainContent" style="display:none">
  <div>
    <label>行程天数：</label>
    <input type="number" id="days" value="3" min="1" style="width:80px">
    <button onclick="createInputs()">生成输入行</button>
  </div>

  <div id="inputArea" style="margin:20px 0"></div>

  <button onclick="build()">生成行程</button>
  <button onclick="downloadWord()">导出 Word（表格+固定图片）</button>

  <div id="output" style="margin-top:30px"></div>
</div>

<script>
let allSpotData = {}; // 存储所有景点数据

// 页面加载时自动加载 JSON
window.onload = function() {
    loadDataFromJson();
};

async function loadDataFromJson() {
    const loadingEl = document.getElementById("loadingStatus");
    loadingEl.textContent = "⏳ 正在加载景点数据...";

    try {
        const response = await fetch('spots.json'); // 服务器 JSON
        const jsonData = await response.json();

        allSpotData = {};
        jsonData.forEach(item => {
            allSpotData[item.name] = {
                content: item.content,
                img1: item.img1 || `https://picsum.photos/seed/${encodeURIComponent(item.name)}_1/320/200`,
                img2: item.img2 || `https://picsum.photos/seed/${encodeURIComponent(item.name)}_2/320/200`
            };
        });

        loadingEl.textContent = `✅ 数据加载完成（共 ${Object.keys(allSpotData).length} 个景点）`;
        document.getElementById("mainContent").style.display = "block";
        createInputs();
    } catch (err) {
        loadingEl.textContent = `❌ 数据加载失败：${err.message}`;
        console.error(err);
    }
}

// 模糊匹配景点
function fuzzyMatchSpot(inputName) {
    if (!inputName.trim()) return null;
    const input = inputName.trim().toLowerCase().replace(/\s+/g, '');
    const spotNames = Object.keys(allSpotData);

    for (const name of spotNames) {
        const spotName = name.toLowerCase().replace(/\s+/g, '');
        if (spotName.includes(input) || input.includes(spotName)) {
            return { name, ...allSpotData[name] };
        }
    }
    return null;
}

// 生成每天3个景点输入框
function createInputs() {
    const n = +document.getElementById("days").value;
    const area = document.getElementById("inputArea");
    area.innerHTML = "";
    for (let i = 1; i <= n; i++) {
        area.innerHTML += `
<div class="day-line">
  <b>第${i}天：</b>
  <input class="p1" placeholder="景点1（可模糊输入）">
  <input class="p2" placeholder="景点2（可模糊输入）">
  <input class="p3" placeholder="景点3（可模糊输入）">
</div>
        `;
    }
}

// 生成行程
function build() {
    const lines = document.querySelectorAll(".day-line");
    const out = document.getElementById("output");
    let html = "";

    lines.forEach((line, idx) => {
        const p1 = line.querySelector(".p1").value.trim();
        const p2 = line.querySelector(".p2").value.trim();
        const p3 = line.querySelector(".p3").value.trim();
        const inputs = [p1, p2, p3].filter(Boolean);
        if (inputs.length === 0) return;

        html += `<div class="card"><div class="day">第${idx+1}天</div>`;

        inputs.forEach((input, i) => {
            const matchedSpot = fuzzyMatchSpot(input);
            let img1 = '', img2 = '';
            if (matchedSpot) {
                img1 = matchedSpot.img1;
                img2 = matchedSpot.img2;
            } else {
                img1 = 'https://picsum.photos/seed/default1/320/200';
                img2 = 'https://picsum.photos/seed/default2/320/200';
            }
            // 只显示两张图片
            if (inputs.length === 1) {
                html += `
<div style="margin-bottom:22px">
  <div class="spot-name">${matchedSpot ? matchedSpot.name : input}</div>
  <div class="match-tip">${matchedSpot ? '✅ 已匹配' : '❌ 未匹配'}</div>
  <div class="desc">${matchedSpot ? matchedSpot.content : '暂无该景点描述'}</div>
  <div class="imgs">
    <img src="${img1}" alt="实景1">
    <img src="${img2}" alt="实景2">
  </div>
</div>
                `;
            } else {
                if (i < 2) { // 前两个景点显示图片
                    html += `
<div style="margin-bottom:22px">
  <div class="spot-name">${matchedSpot ? matchedSpot.name : input}</div>
  <div class="match-tip">${matchedSpot ? '✅ 已匹配' : '❌ 未匹配'}</div>
  <div class="desc">${matchedSpot ? matchedSpot.content : '暂无该景点描述'}</div>
  <div class="imgs">
    <img src="${img1}" alt="实景1">
    <img src="${img2}" alt="实景2">
  </div>
</div>
                    `;
                } else {
                    html += `
<div style="margin-bottom:22px">
  <div class="spot-name">${matchedSpot ? matchedSpot.name : input}</div>
  <div class="match-tip">${matchedSpot ? '✅ 已匹配' : '❌ 未匹配'}</div>
  <div class="desc">${matchedSpot ? matchedSpot.content : '暂无该景点描述'}</div>
</div>
                    `;
                }
            }
        });

        html += `</div>`;
    });

    out.innerHTML = html;
    window.finalHTML = html;
}

// 导出 Word
function downloadWord() {
    if (!window.finalHTML) { alert("请先生成行程"); return; }

    const wordContent = `
<html>
<head>
<meta charset="utf-8">
<style>
table{width:100%;border-collapse:collapse;margin:10px 0}
td{border:1px solid #000;padding:12px;vertical-align:top}
img{width:320px;height:200px;object-fit:cover;border-radius:6px}
.spot-name{font-weight:bold;font-size:16px;margin:6px 0}
.desc{line-height:1.7;margin-bottom:14px;text-align:justify}
.match-tip{color:#2d8cf0;font-size:13px;margin:5px 0}
</style>
</head>
<body>
<h3>旅游行程单</h3>
${window.finalHTML.replace(/<div class="card"/g, '<table><tr><td>')
                   .replace(/<\/div>\s*$/, '</td></tr></table>')}
</body>
</html>
    `;

    const blob = new Blob([wordContent], { type: "application/msword" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "旅游行程表.doc";
    a.click();
}
</script>
</body>
</html>
